app = 'vaultwarden-byrdson'
primary_region = 'sin'
kill_signal = 'SIGTERM'
kill_timeout = '2m0s'

[build]
  image = 'vaultwarden/server:1.36.0'

[env]
  WEBSOCKET_ENABLED = 'true'
  SIGNUPS_ALLOWED = 'false'

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 100
    soft_limit = 50

[[vm]]
  size = 'shared-cpu-1x'
  memory_mb = 512